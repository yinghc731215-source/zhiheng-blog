baseURL: 'https://yinghc731215-source.github.io/'
languageCode: 'zh-CN'
title: '知衡的博客'
theme: 'PaperMod'

pagination:
  pagerSize: 10
enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true

languages:
  zh:
    languageName: '中文'
    weight: 1
    taxonomies:
      category: categories
      tag: tags
    menu:
      main:
        - identifier: archives
          name: 归档
          url: /archives/
          weight: 10
        - identifier: categories
          name: 分类
          url: /categories/
          weight: 20
        - identifier: tags
          name: 标签
          url: /tags/
          weight: 30
        - identifier: search
          name: 搜索
          url: /search/
          weight: 40

params:
  env: production
  title: '知衡的博客'
  description: '术数、易学、文化随笔'
  keywords: [金口诀, 术数, 易学, 文化]
  author: '知衡'
  images: []
  DateFormat: '2006-01-02'
  defaultTheme: auto
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  homeInfoParams:
    Title: '知衡'
    Content: '术数修行者。金口诀、易学、文化随笔。'

  socialIcons:
    - name: github
      url: 'https://github.com/'
    - name: email
      url: 'mailto:zhiheng@example.com'

  assets:
    disableHLJS: true

  label:
    text: '知衡'
    icon:
    iconHeight: 35

  analytics:
    google:
      SiteVerificationTag: ''

  cover:
    hiddenInList: false
    hiddenInSingle: false

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ['title', 'permalink', 'summary', 'content']

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

outputs:
  home:
    - HTML
    - RSS
    - JSON

permalinks:
  post: '/post/:year/:month/:slug/'
